tosca_definitions_version: tosca_simple_yaml_1_0

imports:
  - indigo_custom_types: https://baltig.infn.it/infn-cloud/tosca-types/-/raw/master/tosca_types/base/basic_types.yaml

description: >
  Launch a compute node with attached volume and get the IP and SSH credentials to access via ssh

metadata:
  display_name: Virtual machine

topology_template:

  inputs:
    num_cpus:
      type: integer
      description: Number of virtual cpus for the VM
      default: 1
    mem_size:
      type: scalar-unit.size
      description: Amount of memory for the VM
      default: 2 GB

    os_distribution:
      type: string
      default: ubuntu
      description: Operating System distro
      constraints:
         - valid_values: [ "ubuntu", "rockylinux" ]
    os_version:
      type: version
      default: 22.04
      description: Operating System distribution version
      constraints:
         - valid_values: [ 22.04, 9.5 ]

    hostname:
      description: Hostname
      type: string
      required: yes
      default: vnode0

    mountpoint:
      type: string
      default: /data
      description: Path to mount the volume

    volume_size:
      type: scalar-unit.size
      description: Size of the volume to be attached
      default: 10 GB

    users:
      type: list
      description: list of users to create on the VM
      entry_schema:
        type: tosca.datatypes.indigo.User
      default: []
      required: false

  node_templates:


    priv_network:
      type: tosca.nodes.indigo.network.Network
      properties:
        network_type: private

    server_priv_port:
      type: tosca.nodes.network.Port
      properties:
        order: 0
      requirements:
        - binding: server
        - link: priv_network

    server:
      type: tosca.nodes.indigo.Compute
      properties:
        os_users: { get_input: users }
      capabilities:
        scalable:
          properties:
            count: 1
        host:
          properties:
            num_cpus: { get_input: num_cpus }
            mem_size: { get_input: mem_size }
        os:
          properties:
            distribution: { get_input: os_distribution }
            version: { get_input: os_version }
      requirements:
        - local_storage:
            node: block_device
            capability: tosca.capabilities.Attachment
            relationship:
              type: tosca.relationships.AttachesTo
              properties:
                location: { get_input: mountpoint }
                device: vdb

    block_device:
      type: tosca.nodes.indigo.BlockStorage
      properties:
        size: { get_input: volume_size }

  outputs:
    node_ip:
      value: { get_attribute: [ server, private_address, 0 ] }
    node_creds:
      value: { get_attribute: [ server, endpoint, credential, 0 ] }
    os_users:
      value: { get_property: [ server, os_users, 0 ] }
    vpn_server:
      value: { get_property: [ priv_network, proxy_host ] }
    vpn_client_conf_url:
      value: { concat: [ "vpn-",  get_property: [ priv_network, proxy_host ], "-client.ovpn" ] }
